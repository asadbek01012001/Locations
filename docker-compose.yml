services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "4001:4001"
    env_file:
      - ./backend/.env
    environment:
      PORT: 4001
    volumes:
      - ./locations.xlsx:/data/locations.xlsx

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "4000:80"
    depends_on:
      - backend
